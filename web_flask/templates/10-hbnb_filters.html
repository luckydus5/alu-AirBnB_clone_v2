<!DOCTYPE html>
<HTML lang="en">
    <HEAD>
        <TITLE>HBNB</TITLE>
        <LINK rel="stylesheet" type="text/css" href="/static/styles/4-common.css">
        <LINK rel="stylesheet" type="text/css" href="/static/styles/3-header.css">
        <LINK rel="stylesheet" type="text/css" href="/static/styles/3-footer.css">
        <LINK rel="stylesheet" type="text/css" href="/static/styles/6-filters.css">
        <LINK rel="icon" type="image/png" href="/static/images/icon.png">
    </HEAD>
    <BODY>
        <HEADER>
            <IMG src="/static/images/logo.png" alt="HBNB logo">
        </HEADER>
        <MAIN>
            <DIV class="filters">
                <DIV class="states_filter">
                    <H3>States</H3>
                    <H4>&nbsp;</H4>
                    <UL class="popover">
                    {% for state in states %}
                        <LI>
                            <H2>{{ state.name }}</H2>
                            <UL>
                            {% for city in state.cities|sort(attribute='name') %}
                                <LI>{{ city.name }}</LI>
                            {% endfor %}
                            </UL>
                        </LI>
                    {% endfor %}
                    </UL>
                </DIV>
                <DIV class="amenities_filter">
                    <H3>Amenities</H3>
                    <H4>&nbsp;</H4>
                    <UL class="popover">
                    {% for amenity in amenities %}
                        <LI>{{ amenity.name }}</LI>
                    {% endfor %}
                    </UL>
                </DIV>
                <BUTTON>Search</BUTTON>
            </DIV>
        </MAIN>
        <FOOTER>
            <P>Best School</P>
        </FOOTER>
    </BODY>
</HTML>
